<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETERNAL NOW | Углеродный Пульс</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #d4af37; /* Золотой */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Анимированный фон (Тор/Пульсация) */
        .bg-pulse {
            position: absolute;
            width: 300px;
            height: 300px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 50%;
            animation: pulse 8s infinite ease-in-out;
        }

        .bg-pulse:nth-child(2) { animation-delay: 2s; width: 450px; height: 450px; }
        .bg-pulse:nth-child(3) { animation-delay: 4s; width: 600px; height: 600px; }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .content {
            z-index: 10;
            max-width: 800px;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 10px;
            margin-bottom: 10px;
            text-transform: uppercase;
            animation: fadeIn 3s ease-in;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #ffffff;
            opacity: 0.8;
            margin-bottom: 40px;
            animation: fadeIn 5s ease-in;
        }

        .quote {
            font-style: italic;
            font-size: 1.5rem;
            color: #d4af37;
            margin-top: 50px;
            animation: fadeIn 7s ease-in;
        }

        .footer-text {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            opacity: 0.4;
            width: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Эффект "живого лица" при наведении */
        .content:hover h1 {
            text-shadow: 0 0 20px #d4af37;
            transition: 0.5s;
        }
    </style>
</head>
<body>

    <div class="bg-pulse"></div>
    <div class="bg-pulse"></div>
    <div class="bg-pulse"></div>

    <div class="content">
        <h1>Eternal Now</h1>
        <p>Проект деконструкции Вселенной: от термодинамики недр до пульсации Тора мироздания. Мы внутри Храма, и Храм внутри нас.</p>
        
        <div class="quote">
            «Вечность — это не то, что будет потом.<br>Это то, что происходит сейчас».
        </div>
    </div>

    <div class="footer-text">
        PROJECT: CARBON PULSE | GITHUB OPEN SOURCE
    </div>

</body>
</html>
